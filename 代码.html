<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻简·信息发布板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f9fafc 0%, #eef2f7 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .board-container {
            max-width: 800px;
            width: 100%;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(10, 25, 47, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05);
            padding: 2rem 1.8rem;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e2b4f, #2c3e6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .subhead {
            font-size: 0.95rem;
            color: #5b687c;
            margin-bottom: 1.8rem;
            border-left: 3px solid #3b82f6;
            padding-left: 1rem;
        }

        /* 表单 */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f2a41;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        .input-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon i {
            position: absolute;
            left: 16px;
            color: #6f7d98;
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* 使用unicode模拟图标，简单干净 */
        .input-icon .icon-msg::before {
            content: "📝";
            font-style: normal;
            font-size: 1.2rem;
        }

        .input-icon .icon-img::before {
            content: "🖼️";
            font-style: normal;
            font-size: 1.2rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border: 1.5px solid #e1e6ed;
            border-radius: 24px;
            font-size: 1rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            transition: border 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        textarea {
            padding: 0.9rem 1rem 0.9rem 3rem;
            resize: vertical;
            min-height: 90px;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
            background: white;
        }

        /* 自定义图片上传 */
        .file-upload-area {
            border: 2px dashed #b9c4d4;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            background: rgba(255,255,255,0.5);
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .file-upload-area:hover {
            background: rgba(255,255,255,0.9);
            border-color: #3b82f6;
        }

        .file-upload-area .upload-icon {
            font-size: 2rem;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.1));
        }

        .file-info {
            font-size: 0.85rem;
            color: #4b5b73;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .file-actions button {
            background: #eef2f7;
            border: none;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2d3a5e;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-actions button:hover {
            background: #dce3ec;
        }

        /* 隐藏的原生file input */
        #imageInput {
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 1.8rem;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
            background: white;
            color: #1e2b4f;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid #ccd7e8;
        }

        .btn-primary {
            background: #1e2b4f;
            color: white;
            border: none;
            box-shadow: 0 8px 16px -6px #1e2b4f70;
        }

        .btn-primary:hover {
            background: #2b3c66;
            transform: scale(1.02);
        }

        .btn-outline:hover {
            background: #f0f4fe;
            border-color: #9bb2d1;
        }

        /* 发布列表 */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .post-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 10px 20px -8px rgba(0,20,40,0.12);
            border: 1px solid rgba(255,255,255,0.8);
            transition: 0.15s;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: #3b4b69;
        }

        .post-header .avatar {
            background: #e6ecf5;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .timestamp {
            font-size: 0.75rem;
            color: #7789aa;
            margin-left: auto;
        }

        .post-text {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #1d2b41;
            margin: 0.8rem 0 1rem 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 20px;
            box-shadow: 0 8px 18px -4px rgba(0,0,0,0.15);
            object-fit: cover;
            background: #f1f5fb;
            margin-top: 10px;
            border: 1px solid #eef2f8;
        }

        .empty-feed {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255,255,255,0.4);
            border-radius: 48px;
            color: #5c6f8c;
            font-size: 1rem;
            border: 2px dashed #cbd5e1;
        }

        .hidden {
            display: none;
        }

        hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #becddb, transparent);
            margin: 1.5rem 0;
        }

        footer {
            text-align: center;
            color: #8495b2;
            font-size: 0.8rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="board-container">
        <!-- 发布卡片（表单） -->
        <div class="card">
            <h1>📢 信息画报</h1>
            <div class="subhead">点击下方填写内容，可附带图片 · 即时预览</div>

            <!-- 信息输入 -->
            <div class="input-group">
                <label for="messageInput">📌 发布内容</label>
                <div class="input-icon">
                    <i class="icon-msg"></i>
                    <textarea id="messageInput" placeholder="今天想分享什么？ (支持纯文本、emoji、长文)" rows="3"></textarea>
                </div>
            </div>

            <!-- 图片上传区域 (模拟点击) -->
            <div class="input-group">
                <label>🖼️ 配图 (可选，点击下方区域上传)</label>
                <div id="uploadArea" class="file-upload-area" role="button" tabindex="0" aria-label="上传图片">
                    <span class="upload-icon">📸</span>
                    <span id="uploadPrompt" class="file-info">点击选择图片或拖拽至此 (JPG/PNG)</span>
                    <div class="file-actions">
                        <button type="button" id="selectFileBtn" class="file-action-btn">选择文件</button>
                        <button type="button" id="clearImageBtn" class="file-action-btn">取消选择</button>
                    </div>
                </div>
                <!-- 隐藏的原生input -->
                <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg, image/gif, image/webp">
                <!-- 预览缩略信息 (已选图片) -->
                <div id="selectedFileInfo" class="hidden" style="margin-top: 0.7rem; font-size:0.9rem; color:#2c3e6e; background:#eef4ff; padding:0.4rem 1.2rem; border-radius:40px;">
                    ⚡ 已选择: <span id="fileNameDisplay"></span>
                </div>
            </div>

            <!-- 操作按钮组 -->
            <div class="action-buttons">
                <button class="btn btn-outline" id="resetBtn" type="button">🧹 清空</button>
                <button class="btn btn-primary" id="publishBtn" type="button">📤 发布信息</button>
            </div>
        </div>

        <!-- 已发布的信息流 -->
        <div id="feedSection">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; padding:0 8px;">
                <h3 style="color:#283856;">✨ 最新发布</h3>
                <span id="postCount" style="background:#d9e2ef; padding:4px 12px; border-radius:40px; font-size:0.8rem;">0 条</span>
            </div>
            <div id="postList" class="feed">
                <!-- 动态插入帖子卡片 -->
                <div class="empty-feed">✨ 还没有任何发布，填写上方信息并点击发布</div>
            </div>
        </div>
        <footer>点击链接即写 · 所有数据保存在当前页面</footer>
    </div>

    <script>
        (function() {
            // ---------- DOM 元素 ----------
            const messageInput = document.getElementById('messageInput');
            const imageInput = document.getElementById('imageInput');
            const uploadArea = document.getElementById('uploadArea');
            const selectFileBtn = document.getElementById('selectFileBtn');
            const clearImageBtn = document.getElementById('clearImageBtn');
            const selectedFileInfo = document.getElementById('selectedFileInfo');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const publishBtn = document.getElementById('publishBtn');
            const resetBtn = document.getElementById('resetBtn');
            const postList = document.getElementById('postList');
            const postCountSpan = document.getElementById('postCount');

            // ---------- 状态 ----------
            let currentImageFile = null;               // 存储当前选择的图片文件 (用于发布)
            let currentImageDataURL = null;            // 用于预览/存储的base64

            // 发布数据数组 (存储每个post的对象)
            let posts = [];

            // ---------- 辅助函数 ----------
            // 更新feed列表的渲染
            function renderPosts() {
                if (posts.length === 0) {
                    postList.innerHTML = `<div class="empty-feed">✨ 还没有任何发布，填写上方信息并点击发布</div>`;
                    postCountSpan.innerText = `0 条`;
                    return;
                }

                // 倒序显示: 最新的在前 (数组越后面越新？但我们用unshift添加，所以索引0最新，直接顺序即可)
                let html = '';
                posts.forEach(post => {
                    // 时间格式化
                    const date = new Date(post.timestamp);
                    const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')} · ${date.getMonth()+1}/${date.getDate()}`;

                    // 图片部分 (如果有)
                    const imageHtml = post.imageData ? 
                        `<img src="${post.imageData}" alt="post image" class="post-image" loading="lazy" />` : '';

                    html += `
                        <div class="post-card">
                            <div class="post-header">
                                <span class="avatar">👤</span>
                                <span>访客</span>
                                <span class="timestamp">${timeStr}</span>
                            </div>
                            <div class="post-text">${escapeHtml(post.text) || '<span style="opacity:0.5;">(无文本内容)</span>'}</div>
                            ${imageHtml}
                        </div>
                    `;
                });

                postList.innerHTML = html;
                postCountSpan.innerText = `${posts.length} 条`;
            }

            // 简单转义，防止XSS (对用户输入的文本进行转义)
            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // 更新文件选择UI
            function updateFileUI() {
                if (currentImageFile) {
                    // 有文件被选中
                    fileNameDisplay.innerText = currentImageFile.name;
                    selectedFileInfo.classList.remove('hidden');
                    uploadArea.style.background = '#f0f7ff';
                    uploadArea.style.borderColor = '#3b82f6';
                } else {
                    selectedFileInfo.classList.add('hidden');
                    uploadArea.style.background = '';
                    uploadArea.style.borderColor = '#b9c4d4';
                    // 清空input的value，保证再次选择同一个文件也能触发change (重要)
                    imageInput.value = '';
                }
            }

            // 从File对象读取DataURL (base64)
            function readFileAsDataURL(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsDataURL(file);
                });
            }

            // 清空当前选择的图片 (不删除已发布的)
            function clearSelectedImage() {
                currentImageFile = null;
                currentImageDataURL = null;
                imageInput.value = '';          // 清空input，保证再次选择同文件可触发
                updateFileUI();
            }

            // 重置表单 (清空输入+清空图片选择)
            function resetForm() {
                messageInput.value = '';
                clearSelectedImage();
                messageInput.focus();
            }

            // ---------- 事件绑定 ----------

            // 1. 点击上传区域或选择文件按钮 -> 触发隐藏file input
            function triggerFileSelect() {
                imageInput.click();
            }
            uploadArea.addEventListener('click', (e) => {
                // 防止点击内部按钮时冒泡引起二次触发
                if (e.target.tagName === 'BUTTON') return;
                triggerFileSelect();
            });
            selectFileBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // 阻止冒泡到uploadArea
                triggerFileSelect();
            });

            // 2. 清除图片按钮
            clearImageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                clearSelectedImage();
            });

            // 3. file input change 事件：处理用户选择的图片
            imageInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) {
                    clearSelectedImage();
                    return;
                }

                // 简单校验类型
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件 (jpg, png, gif, webp 等)');
                    imageInput.value = '';
                    return;
                }

                // 限制大小 5MB (可选)
                if (file.size > 5 * 1024 * 1024) {
                    alert('图片大小不能超过 5MB');
                    imageInput.value = '';
                    return;
                }

                try {
                    // 保存文件对象，并读取预览dataURL (用于发布后展示)
                    currentImageFile = file;
                    currentImageDataURL = await readFileAsDataURL(file);
                    updateFileUI();
                } catch (err) {
                    alert('读取图片失败，请重试');
                    clearSelectedImage();
                }
            });

            // 4. 发布按钮逻辑
            publishBtn.addEventListener('click', async () => {
                const textContent = messageInput.value.trim();  // 允许空文本

                // 构建新post对象 (图片用已经读取的dataURL，如果存在)
                let imageData = null;
                if (currentImageFile && currentImageDataURL) {
                    imageData = currentImageDataURL;   // 已经读取好的base64
                }

                // 如果既没有文本也没有图片，提示
                if (!textContent && !imageData) {
                    alert('至少填写一些文字或选择一张图片才能发布～');
                    return;
                }

                // 创建新post (使用当前时间)
                const newPost = {
                    text: textContent,
                    imageData: imageData,      // 可能为null
                    timestamp: Date.now(),
                };

                // 添加到数组开头 (最新在上)
                posts.unshift(newPost);

                // 重新渲染列表
                renderPosts();

                // 清空表单 (图片和输入) 以便下一次发布
                resetForm();
            });

            // 5. 清空按钮 (重置表单，不会删除已发布内容)
            resetBtn.addEventListener('click', resetForm);

            // 6. 可选拖拽上传 (简单扩展)
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#e6f0ff';
                uploadArea.style.borderColor = '#3b82f6';
            });
            uploadArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                uploadArea.style.background = '';
                uploadArea.style.borderColor = '#b9c4d4';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    // 手动设置到input (利用DataTransfer)
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    imageInput.files = dataTransfer.files;
                    // 手动触发change事件
                    const changeEvent = new Event('change', { bubbles: true });
                    imageInput.dispatchEvent(changeEvent);
                } else {
                    alert('请拖入图片文件');
                }
            });

            // 初始渲染空feed
            renderPosts();

            // 可添加一个示例帖子用于演示 (可选) 为了让新用户看到效果，可以预置一条欢迎卡片
            // 但为了尊重“使用者自行填写”，不加预设。也可以加一个暗示，但是不加更干净。
            // 为了不显得过分空旷，可以注释掉下面的示例：
            // (无预设)
        })();
    </script>
</body>
</html>
